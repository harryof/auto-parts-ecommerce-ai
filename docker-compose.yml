

services:


  postgres:
    image: postgres:16-alpine
    container_name: autoparts_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME}
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10


  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: autoparts_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST:       postgres
      DB_PORT:       5432
      DB_NAME:       ${DB_NAME}
      DB_USER:       ${DB_USER}
      DB_PASSWORD:   ${DB_PASSWORD}
      JWT_SECRET:    ${JWT_SECRET}
      JWT_EXPIRES_IN: 7d
      PORT:          5000
      NODE_ENV:      production
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "5000:5000"


  ai-agent:
    build:
      context: .
      dockerfile: ai-agent/Dockerfile
    container_name: autoparts_ai
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT:                5001
      DB_HOST:             postgres
      DB_PORT:             5432
      DB_NAME:             ${DB_NAME}
      DB_USER:             ${DB_USER}
      DB_PASSWORD:         ${DB_PASSWORD}
      GIGACHAT_CREDENTIALS: ${GIGACHAT_CREDENTIALS}
    ports:
      - "5001:5001"


  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: autoparts_frontend
    restart: unless-stopped
    depends_on:
      - backend
      - ai-agent
    ports:
      - "80:80"


volumes:
  postgres_data:
  uploads_data:
