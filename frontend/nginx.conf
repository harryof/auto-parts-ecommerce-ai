server {
    listen 80;
    server_name _;

    # Статические файлы React-приложения
    root /usr/share/nginx/html;
    index index.html;

    # ── AI Agent: /api/chat → ai-agent:5001 ─────────────────────
    # Это правило должно быть ВЫШЕ общего /api/
    location = /api/chat {
        proxy_pass         http://ai-agent:5001/api/chat;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # ── Backend API: /api/* → backend:5000 ───────────────────────
    location /api/ {
        proxy_pass         http://backend:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    # ── Загруженные изображения ───────────────────────────────────
    location /uploads/ {
        proxy_pass http://backend:5000/uploads/;
    }

    # ── React SPA: все остальное → index.html ────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Gzip сжатие
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1000;
}
